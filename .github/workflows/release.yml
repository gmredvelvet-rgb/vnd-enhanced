name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build module.zip
        run: |
          zip -r module.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude ".gitignore" \
            --exclude "backend/*" \
            --exclude "generated/*" \
            --exclude "sql/*" \
            --exclude "module.zip"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "VN Dialogues Enhanced v${{ steps.ver.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          files: module.zip
          token: ${{ secrets.GITHUB_TOKEN }}
